<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"></script>

    <title th:text="${title}"></title>
</head>

<body>

<!-- fine fragment -->

<!-- inizio nav -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">

        <a class="navbar-brand" href="#">Aulab Chronicle</a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li sec:authorize="isAuthenticated" class="nav-item">
                    <a class="nav-link" href="/articles/create">Crea articolo</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Link</a>
                </li>

                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Accesso
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                        <li sec:authorize="isAnonymous()"><a class="dropdown-item" aria-current="page" th:href="@{/register}">Register</a></li>
                        <li sec:authorize="isAnonymous()"><a class="dropdown-item" aria-current="page" th:href="@{/login}">Login</a></li>
                        <li sec:authorize="isAuthenticated()"><a class="dropdown-item" aria-current="page" th:href="@{/logout}">Logout</a></li>
                    </ul>
                </li>
            </ul>
            <div sec:authorize="isAuthenticated()" th:text="'Benvenuto: ' + ${#authentication.principal.fullname} + ' - ' + ${#authentication.principal.authorities[0].authority.replace('ROLE_', '')}">
                Benvenuto</div>
            <form class="d-flex">
                <input class="form-control me-2"
                       type="search"
                       placeholder="Search"
                       name="keyword"
                       aria-label="Search">

                <button class="btn btn-outline-success" type="submit">
                    Search
                </button>
            </form>

        </div>
    </div>
</nav>
<!-- fine navbar -->

<!-- Footer -->
<footer th:fragment="footer" class="bg-dark text-white pt-4">

    <div class="container">

        <div class="row justify-content-between">

            <!-- Company Info -->
            <div class="col-md-4 mb-3">
                <h5>Aulab IT</h5>
                <a href="#">...</a>
            </div>

            <!-- Contact Info -->
            <div class="col-md-4 mb-3 text-end">
                <h5>Lavora con noi</h5>
                <a href="#" class="btn btn-primary">Richiedici</a>
            </div>

        </div>
    </div>

    <div class="bg-secondary text-center py-2">
        <p class="mb-0">
            © 2024 Aulab Job. All rights reserved.
        </p>
    </div>

</footer>
<!-- fine del footer -->

<!-- fragment script bootstrap -->
<script th:fragment="bootstrapScript"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9DVLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous">
</script>

</body>
</html>
